---
# Alertmanager handles alerts sent by client applications such as Prometheus
# Project source code URL: https://github.com/prometheus/alertmanager

prometheus_alertmanager_enabled: true

prometheus_alertmanager_identifier: prometheus-alertmanager
prometheus_alertmanager_base_path: "/{{ prometheus_alertmanager_identifier }}"
prometheus_alertmanager_config_path: "{{ prometheus_alertmanager_base_path }}/config"
prometheus_alertmanager_templates_path: "{{ prometheus_alertmanager_base_path }}/templates"
prometheus_alertmanager_data_path: "{{ prometheus_alertmanager_base_path }}/data"

# renovate: datasource=docker depName=prom/alertmanager versioning=semver
prometheus_alertmanager_version: v0.31.1

prometheus_alertmanager_uid: ""
prometheus_alertmanager_gid: ""

# The hostname at which Alertmanager is served.
prometheus_alertmanager_hostname: ""

# The path at which Alertmanager is served.
# This value must either be `/` or not end with a slash (e.g. `/alertmanager`).
prometheus_alertmanager_path_prefix: /

prometheus_alertmanager_container_image: "{{ prometheus_alertmanager_container_image_registry_prefix }}prom/alertmanager:{{ prometheus_alertmanager_container_image_tag }}"
prometheus_alertmanager_container_image_tag: "{{ prometheus_alertmanager_version }}"
prometheus_alertmanager_container_image_registry_prefix: "{{ prometheus_alertmanager_container_image_registry_prefix_upstream }}"
prometheus_alertmanager_container_image_registry_prefix_upstream: "{{ prometheus_alertmanager_container_image_registry_prefix_upstream_default }}"
prometheus_alertmanager_container_image_registry_prefix_upstream_default: docker.io/
prometheus_alertmanager_container_image_force_pull: "{{ prometheus_alertmanager_container_image.endswith(':latest') }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
prometheus_alertmanager_container_network: "{{ prometheus_alertmanager_identifier }}"

# Control if the container network is deleted on uninstalling.
prometheus_alertmanager_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `prometheus_alertmanager_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
prometheus_alertmanager_container_http_host_bind_port: ""

# The port number in the container
prometheus_alertmanager_container_http_port: 9093

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
prometheus_alertmanager_container_additional_networks: "{{ prometheus_alertmanager_container_additional_networks_auto + prometheus_alertmanager_container_additional_networks_custom }}"
prometheus_alertmanager_container_additional_networks_auto: []
prometheus_alertmanager_container_additional_networks_custom: []

# prometheus_alertmanager_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `prometheus_alertmanager_container_labels_additional_labels_custom`.
prometheus_alertmanager_container_labels_traefik_enabled: false
prometheus_alertmanager_container_labels_traefik_docker_network: "{{ prometheus_alertmanager_container_network }}"
prometheus_alertmanager_container_labels_traefik_hostname: "{{ prometheus_alertmanager_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/alertmanager`).
prometheus_alertmanager_container_labels_traefik_path_prefix: "{{ prometheus_alertmanager_path_prefix }}"
prometheus_alertmanager_container_labels_traefik_rule: "Host(`{{ prometheus_alertmanager_container_labels_traefik_hostname }}`){% if prometheus_alertmanager_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ prometheus_alertmanager_container_labels_traefik_path_prefix }}`){% endif %}"
prometheus_alertmanager_container_labels_traefik_priority: 0
prometheus_alertmanager_container_labels_traefik_entrypoints: web-secure
prometheus_alertmanager_container_labels_traefik_tls: "{{ prometheus_alertmanager_container_labels_traefik_entrypoints != 'web' }}"
prometheus_alertmanager_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `prometheus_alertmanager_container_labels_traefik_additional_request_headers_custom`
prometheus_alertmanager_container_labels_traefik_additional_request_headers: "{{ prometheus_alertmanager_container_labels_traefik_additional_request_headers_auto | combine(prometheus_alertmanager_container_labels_traefik_additional_request_headers_custom) }}"
prometheus_alertmanager_container_labels_traefik_additional_request_headers_auto: {}
prometheus_alertmanager_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `prometheus_alertmanager_container_labels_traefik_additional_response_headers_custom`
prometheus_alertmanager_container_labels_traefik_additional_response_headers: "{{ prometheus_alertmanager_container_labels_traefik_additional_response_headers_auto | combine(prometheus_alertmanager_container_labels_traefik_additional_response_headers_custom) }}"
prometheus_alertmanager_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': prometheus_alertmanager_http_header_xss_protection} if prometheus_alertmanager_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': prometheus_alertmanager_http_header_content_type_options} if prometheus_alertmanager_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': prometheus_alertmanager_http_header_content_security_policy} if prometheus_alertmanager_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': prometheus_alertmanager_http_header_permissions_policy} if prometheus_alertmanager_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': prometheus_alertmanager_http_header_strict_transport_security} if prometheus_alertmanager_http_header_strict_transport_security and prometheus_alertmanager_container_labels_traefik_tls else {})
  }}
prometheus_alertmanager_container_labels_traefik_additional_response_headers_custom: {}

# prometheus_alertmanager_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `prometheus_alertmanager_container_labels_additional_labels_custom`
#
# Example:
# prometheus_alertmanager_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
prometheus_alertmanager_container_labels_additional_labels: "{{ prometheus_alertmanager_container_labels_additional_labels_auto + prometheus_alertmanager_container_labels_additional_labels_custom }}"
prometheus_alertmanager_container_labels_additional_labels_auto: []
prometheus_alertmanager_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
prometheus_alertmanager_container_extra_arguments: "{{ prometheus_alertmanager_container_extra_arguments_auto + prometheus_alertmanager_container_extra_arguments_custom }}"
prometheus_alertmanager_container_extra_arguments_auto: []
prometheus_alertmanager_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
prometheus_alertmanager_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
prometheus_alertmanager_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
prometheus_alertmanager_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
prometheus_alertmanager_http_header_permissions_policy: "{{ 'interest-cohort=()' if prometheus_alertmanager_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
prometheus_alertmanager_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if prometheus_alertmanager_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `prometheus_alertmanager_http_header_permissions_policy`
prometheus_alertmanager_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `prometheus_alertmanager_http_header_strict_transport_security`
prometheus_alertmanager_hsts_preload_enabled: false

# A list of extra arguments to pass to the Alertmanager process
# Example: ['--SOME_ARGUMENT']
prometheus_alertmanager_process_extra_arguments: "{{ prometheus_alertmanager_process_extra_arguments_default + prometheus_alertmanager_process_extra_arguments_auto + prometheus_alertmanager_process_extra_arguments_custom }}"
prometheus_alertmanager_process_extra_arguments_default:
  - "--config.file=/etc/alertmanager/alertmanager.yml"
prometheus_alertmanager_process_extra_arguments_auto: []
prometheus_alertmanager_process_extra_arguments_custom: []

# List of systemd services that the Alertmanager systemd service depends on
prometheus_alertmanager_systemd_required_services_list: "{{ prometheus_alertmanager_systemd_required_services_list_default + prometheus_alertmanager_systemd_required_services_list_auto + prometheus_alertmanager_systemd_required_services_list_custom }}"
prometheus_alertmanager_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
prometheus_alertmanager_systemd_required_services_list_auto: []
prometheus_alertmanager_systemd_required_services_list_custom: []

# List of systemd services that the Alertmanager systemd service wants
prometheus_alertmanager_systemd_wanted_services_list: "{{ prometheus_alertmanager_systemd_wanted_services_list_default + prometheus_alertmanager_systemd_wanted_services_list_auto + prometheus_alertmanager_systemd_wanted_services_list_custom }}"
prometheus_alertmanager_systemd_wanted_services_list_default: []
prometheus_alertmanager_systemd_wanted_services_list_auto: []
prometheus_alertmanager_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
prometheus_alertmanager_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
prometheus_alertmanager_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
prometheus_alertmanager_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
prometheus_alertmanager_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ prometheus_alertmanager_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ prometheus_alertmanager_container_stop_grace_time_seconds }} {{ prometheus_alertmanager_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ prometheus_alertmanager_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ prometheus_alertmanager_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ prometheus_alertmanager_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ prometheus_alertmanager_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ prometheus_alertmanager_identifier }} after {{ prometheus_alertmanager_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# prometheus_alertmanager_basic_auth_enabled controls whether HTTP Basic authentication is enabled.
# Also see `prometheus_alertmanager_container_label_basicauth_users`.
prometheus_alertmanager_basic_auth_enabled: false
prometheus_alertmanager_basic_auth_username: ""
prometheus_alertmanager_basic_auth_password: ""
# prometheus_alertmanager_container_label_basicauth_users is populated at runtime based on
# prometheus_alertmanager_basic_auth_username and prometheus_alertmanager_basic_auth_password
prometheus_alertmanager_container_label_basicauth_users: ""
prometheus_alertmanager_basic_auth_apache_container_image: "{{ prometheus_alertmanager_basic_auth_apache_container_image_registry_prefix }}httpd:{{ prometheus_alertmanager_basic_auth_apache_container_image_tag }}"
prometheus_alertmanager_basic_auth_apache_container_image_tag: "2.4.56-alpine3.17"
prometheus_alertmanager_basic_auth_apache_container_image_force_pull: "{{ prometheus_alertmanager_basic_auth_apache_container_image.endswith(':latest') }}"
prometheus_alertmanager_basic_auth_apache_container_image_registry_prefix: docker.io/

# Default Alertmanager configuration template which covers the generic use case.
# You can customize it by controlling the various variables inside it.
#
# For a more advanced customization, you can extend the default (see `prometheus_alertmanager_configuration_extension_yaml`)
# or completely replace this variable with your own template.
prometheus_alertmanager_configuration_yaml: "{{ lookup('template', 'templates/alertmanager.yml.j2') }}"

prometheus_alertmanager_configuration_extension_yaml: |
  # Your custom YAML configuration goes here.
  # This configuration extends the default starting configuration (`prometheus_alertmanager_configuration_yaml`).
  #
  # You can override individual variables from the default configuration, or introduce new ones.
  #
  # If you need something more special, you can take full control by
  # completely redefining `prometheus_alertmanager_configuration_yaml`.

prometheus_alertmanager_configuration_extension: "{{ prometheus_alertmanager_configuration_extension_yaml | from_yaml if prometheus_alertmanager_configuration_extension_yaml | from_yaml is mapping else {} }}"

# Holds the final configuration (a combination of the default and its extension).
# You most likely don't need to touch this variable. Instead, see `prometheus_alertmanager_configuration_yaml`.
prometheus_alertmanager_configuration: "{{ prometheus_alertmanager_configuration_yaml | from_yaml | combine(prometheus_alertmanager_configuration_extension, recursive=True) }}"

prometheus_alertmanager_config_global: []

prometheus_alertmanager_config_receivers: []

prometheus_alertmanager_config_route: []

# Specify the timezone
prometheus_alertmanager_environment_variables_tz: UTC

# Additional environment variables.
prometheus_alertmanager_environment_variables_additional_variables: ""

# prometheus_alertmanager_restart_necessary controls whether the Alertmanager systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
prometheus_alertmanager_restart_necessary: false
